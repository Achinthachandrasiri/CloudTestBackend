name: Node.js CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Prevent multiple deployments at the same time
concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # 3. Install dependencies (CI safe install)
      - name: Install dependencies
        run: npm ci

      # 4. Run build (if your project has it)
      - name: Build project
        run: npm run build --if-present

      # 5. Run tests (if available)
      - name: Run tests
        run: npm test --if-present || echo "No tests or failing test script - skipping"
        
      # 6. Deploy to server
      - name: Deploy to server
        run: |
          set -e

          rsync -av --delete \
            --exclude node_modules \
            --exclude .git \
            $GITHUB_WORKSPACE/ /var/alphadevs/my_web_app/CloudTestBackend/

          cd /var/alphadevs/my_web_app/CloudTestBackend

          npm ci --omit=dev

      # 7. Restart app safely (zero-downtime if possible)
      - name: Restart app
        run: |
          pm2 reload CloudTestBackend || pm2 restart CloudTestBackend

      # 8. Verify app is running
      - name: Check PM2 status
        run: pm2 status