name: Node.js CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Prevent multiple deployments at the same time
concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Create .env file 
      - name: Create environment file
        run: |
          cat <<EOF > .env
          PORT=${{ secrets.PORT }}
          MONGO_URI=${{ secrets.MONGO_URI }}
          NODE_ENV=${{ secrets.NODE_ENV }}
          CLIENT_URL=${{ secrets.CLIENT_URL }}
          EOF

      # 5. Build project (if needed)
      - name: Build project
        run: npm run build --if-present

      # 6. Run tests (optional)
      - name: Run tests
        run: npm test --if-present || echo "Skipping tests"

      # 7. Deploy to server
      - name: Deploy to server
        run: |
          set -e

          rsync -av --delete \
            --exclude node_modules \
            --exclude .git \
            $GITHUB_WORKSPACE/ /var/alphadevs/my_web_app/CloudTestBackend/

          cd /var/alphadevs/my_web_app/CloudTestBackend

          npm ci --omit=dev

      # 8. Restart app safely
      - name: Restart app
        run: |
          pm2 delete CloudTestBackend || true
          pm2 start npm --name "CloudTestBackend" -- start

      # 9. Check status
      - name: Check PM2 status
        run: pm2 status